name: "[CI] PR Validation"

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  # Job to detect if code changes occurred
  changes:
    name: Check for code changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
    - uses: actions/checkout@v6
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          code:
            - 'platforms/**'
            - 'scripts/**'
            - '.github/workflows/**'

  detect-latest:
    name: Check latest Godot version
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    outputs:
      godot_version: ${{ steps.detect.outputs.godot_version }}
    steps:
    - name: Detect latest Godot version
      id: detect
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        LATEST=$(gh api repos/godotengine/godot/releases \
          --jq '[.[] | select(.tag_name | test("^4\\.[0-9]+(\\.[0-9]+)?-stable$")) | .tag_name][0]' \
          | sed 's/-stable//' \
          | awk -F. '{if(NF==2) print $0".0"; else print $0}')
        echo "godot_version=$LATEST" >> $GITHUB_OUTPUT

  build-android:
    name: "Build: Android Plugin"
    needs: [changes, detect-latest]
    if: needs.changes.outputs.code == 'true'
    runs-on: "ubuntu-latest"
    steps:
    - uses: actions/checkout@v6

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: android-gradle-${{ hashFiles('platforms/android/**/*.gradle*', 'platforms/android/gradle.properties') }}
        restore-keys: android-gradle-

    - name: Build Plugins
      working-directory: platforms/android
      run: |
        chmod +x ./gradlew
        ./gradlew build -PgodotVersion=${{ needs.detect-latest.outputs.godot_version }}

    - name: Compress the artifact output
      working-directory: platforms/android
      run: |
        ./gradlew zipPlugins -PgodotVersion="${{ needs.detect-latest.outputs.godot_version }}"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: poing-godot-admob-android-v${{ needs.detect-latest.outputs.godot_version }}-${{ github.event.pull_request.head.sha }}
        path: platforms/android/.output/poing-godot-admob-android-v${{ needs.detect-latest.outputs.godot_version }}.zip
        retention-days: 14

  build-ios:
    name: "Build: iOS Plugin"
    needs: [changes, detect-latest]
    if: needs.changes.outputs.code == 'true'
    runs-on: "macos-latest"
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha }}

    - name: Load .scons_cache directory
      uses: actions/cache@v5
      with:
        path: ${{github.workspace}}/platforms/ios/godot/.scons_cache/
        key: scons-ios-${{ needs.detect-latest.outputs.godot_version }}-${{ hashFiles('platforms/ios/SConstruct', 'platforms/ios/scripts/**') }}
        restore-keys: |
          scons-ios-${{ needs.detect-latest.outputs.godot_version }}-
          scons-ios-

    - name: Set up Python 3.x
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'
        architecture: 'x64'

    - name: Configuring Python packages
      run: |
        python -m pip install scons

    - name: Cache SPM dependencies
      uses: actions/cache@v5
      with:
        path: platforms/ios/.build
        key: spm-${{ hashFiles('platforms/ios/Package.swift', 'platforms/ios/Package.resolved') }}
        restore-keys: |
          spm-

    - name: Compiles the Source Code
      working-directory: platforms/ios
      env:
        SCONS_CACHE: ${{github.workspace}}/platforms/ios/godot/.scons_cache/
      run: |
        ./scripts/build.sh ${{ needs.detect-latest.outputs.godot_version }}

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: poing-godot-admob-ios-v${{ needs.detect-latest.outputs.godot_version }}-${{ github.event.pull_request.head.sha }}
        path: platforms/ios/bin/release/*.zip
        if-no-files-found: ignore
        retention-days: 14

  build-apk:
    name: "Build: Test Project (Android APK)"
    needs: [changes, detect-latest, build-android]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Godot Editor
      id: cache-godot
      uses: actions/cache@v4
      with:
        path: /usr/local/bin/godot
        key: godot-linux-${{ needs.detect-latest.outputs.godot_version }}

    - name: Download Godot
      if: steps.cache-godot.outputs.cache-hit != 'true'
      run: |
        GODOT_VERSION=${{ needs.detect-latest.outputs.godot_version }}
        DOWNLOAD_VERSION="${GODOT_VERSION%.0}"
        wget -q "https://github.com/godotengine/godot/releases/download/${DOWNLOAD_VERSION}-stable/Godot_v${DOWNLOAD_VERSION}-stable_linux.x86_64.zip" -O godot.zip
        unzip -q godot.zip
        mv Godot_v${DOWNLOAD_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
        chmod +x /usr/local/bin/godot

    - name: Cache Export Templates
      id: cache-templates
      uses: actions/cache@v4
      with:
        path: ~/.local/share/godot/export_templates
        key: godot-templates-${{ needs.detect-latest.outputs.godot_version }}

    - name: Download Export Templates
      if: steps.cache-templates.outputs.cache-hit != 'true'
      run: |
        GODOT_VERSION=${{ needs.detect-latest.outputs.godot_version }}
        DOWNLOAD_VERSION="${GODOT_VERSION%.0}"
        wget -q "https://github.com/godotengine/godot/releases/download/${DOWNLOAD_VERSION}-stable/Godot_v${DOWNLOAD_VERSION}-stable_export_templates.tpz" -O templates.tpz
        mkdir -p ~/.local/share/godot/export_templates/${DOWNLOAD_VERSION}.stable
        unzip -q templates.tpz
        mv templates/* ~/.local/share/godot/export_templates/${DOWNLOAD_VERSION}.stable/

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Download Android Plugin Binaries
      uses: actions/download-artifact@v4
      with:
        name: poing-godot-admob-android-v${{ needs.detect-latest.outputs.godot_version }}-${{ github.event.pull_request.head.sha }}
        path: platforms/android/.output/

    - name: Extract Plugin Binaries to Addon
      working-directory: platforms/godot_editor
      run: |
        mkdir -p addons/admob/android/bin
        unzip -o ../android/.output/poing-godot-admob-android-v${{ needs.detect-latest.outputs.godot_version }}.zip -d addons/admob/android/bin/

    - name: Set Android SDK Path for Godot
      run: |
        mkdir -p ~/.config/godot
        cat > ~/.config/godot/editor_settings-4.tres <<EOF
        [gd_resource type="EditorSettings" format=3]
        [resource]
        export/android/android_sdk_path = "$ANDROID_HOME"
        export/android/java_sdk_path = "$JAVA_HOME"
        EOF

    - name: Generate Export Presets
      working-directory: platforms/godot_editor
      run: |
        cat > export_presets.cfg <<'EOF'
        [preset.0]

        name="Android"
        platform="Android"
        runnable=true
        dedicated_server=false
        custom_features=""
        export_filter="all_resources"
        include_filter=""
        exclude_filter=""
        export_path=""
        encryption_include_filters=""
        encryption_exclude_filters=""
        seed=0
        encrypt_pck=false
        encrypt_directory=false
        script_export_mode=2

        [preset.0.options]

        custom_template/debug=""
        custom_template/release=""
        gradle_build/use_gradle_build=true
        gradle_build/gradle_build_directory=""
        gradle_build/android_source_template=""
        gradle_build/compress_native_libraries=false
        gradle_build/export_format=0
        gradle_build/min_sdk=""
        gradle_build/target_sdk=""
        architectures/armeabi-v7a=false
        architectures/arm64-v8a=true
        architectures/x86=false
        architectures/x86_64=false
        version/code=1
        version/name=""
        package/unique_name="com.poingstudios.admob.sample"
        package/name="AdMob Sample"
        package/signed=true
        package/app_category=2
        package/retain_data_on_uninstall=false
        package/exclude_from_recents=false
        package/show_in_android_tv=false
        package/show_in_app_library=true
        package/show_as_launcher_app=false
        graphics/opengl_debug=false
        xr_features/xr_mode=0
        screen/immersive_mode=true
        screen/support_small=true
        screen/support_normal=true
        screen/support_large=true
        screen/support_xlarge=true
        EOF

    - name: Import Project Resources
      working-directory: platforms/godot_editor
      run: |
        timeout 120 godot --headless --import --quit || true

    - name: Install Android Build Template
      working-directory: platforms/godot_editor
      run: |
        GODOT_VERSION=${{ needs.detect-latest.outputs.godot_version }}
        DOWNLOAD_VERSION="${GODOT_VERSION%.0}"
        mkdir -p android/build
        unzip ~/.local/share/godot/export_templates/${DOWNLOAD_VERSION}.stable/android_source.zip -d android/build
        echo "${DOWNLOAD_VERSION}.stable" > android/.build_version

    - name: Export APK
      working-directory: platforms/godot_editor
      run: |
        mkdir -p .output
        godot --headless --export-debug "Android" .output/AdMobAddon.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: AdMobAddon-Android-GDScript-v${{ needs.detect-latest.outputs.godot_version }}-${{ github.event.pull_request.head.sha }}
        path: platforms/godot_editor/.output/AdMobAddon.apk
        retention-days: 14

  build-apk-csharp:
    name: "Build: Test Project (Android APK C#)"
    needs: [changes, detect-latest, build-android]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Cache Godot Editor (.NET)
      id: cache-godot-dotnet
      uses: actions/cache@v4
      with:
        path: |
          /usr/local/bin/godot
          /usr/local/bin/GodotSharp
        key: godot-linux-mono-${{ needs.detect-latest.outputs.godot_version }}

    - name: Download Godot (.NET)
      if: steps.cache-godot-dotnet.outputs.cache-hit != 'true'
      run: |
        GODOT_VERSION=${{ needs.detect-latest.outputs.godot_version }}
        DOWNLOAD_VERSION="${GODOT_VERSION%.0}"
        wget -q "https://github.com/godotengine/godot/releases/download/${DOWNLOAD_VERSION}-stable/Godot_v${DOWNLOAD_VERSION}-stable_mono_linux_x86_64.zip" -O godot.zip
        unzip -q godot.zip
        # Robustly find and move the binary and GodotSharp folder
        find . -name "Godot_v${DOWNLOAD_VERSION}-stable_mono_linux.x86_64" -exec cp {} /usr/local/bin/godot \;
        find . -name "GodotSharp" -type d -exec cp -r {} /usr/local/bin/ \;
        chmod +x /usr/local/bin/godot

    - name: Cache Export Templates
      id: cache-templates
      uses: actions/cache@v4
      with:
        path: ~/.local/share/godot/export_templates
        key: godot-templates-mono-${{ needs.detect-latest.outputs.godot_version }}

    - name: Download Export Templates
      if: steps.cache-templates.outputs.cache-hit != 'true'
      run: |
        GODOT_VERSION=${{ needs.detect-latest.outputs.godot_version }}
        DOWNLOAD_VERSION="${GODOT_VERSION%.0}"
        wget -q "https://github.com/godotengine/godot/releases/download/${DOWNLOAD_VERSION}-stable/Godot_v${DOWNLOAD_VERSION}-stable_mono_export_templates.tpz" -O templates.tpz
        mkdir -p ~/.local/share/godot/export_templates/${DOWNLOAD_VERSION}.stable.mono
        unzip -q templates.tpz
        mv templates/* ~/.local/share/godot/export_templates/${DOWNLOAD_VERSION}.stable.mono/

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Download Android Plugin Binaries
      uses: actions/download-artifact@v4
      with:
        name: poing-godot-admob-android-v${{ needs.detect-latest.outputs.godot_version }}-${{ github.event.pull_request.head.sha }}
        path: platforms/android/.output/

    - name: Extract Plugin Binaries to Addon
      working-directory: platforms/godot_editor
      run: |
        mkdir -p addons/admob/android/bin
        unzip -o ../android/.output/poing-godot-admob-android-v${{ needs.detect-latest.outputs.godot_version }}.zip -d addons/admob/android/bin/

    - name: Set Android SDK Path for Godot
      run: |
        mkdir -p ~/.config/godot
        cat > ~/.config/godot/editor_settings-4.tres <<EOF
        [gd_resource type="EditorSettings" format=3]
        [resource]
        export/android/android_sdk_path = "$ANDROID_HOME"
        export/android/java_sdk_path = "$JAVA_HOME"
        EOF

    - name: Generate Export Presets
      working-directory: platforms/godot_editor
      run: |
        cat > export_presets.cfg <<'EOF'
        [preset.0]

        name="Android"
        platform="Android"
        runnable=true
        dedicated_server=false
        custom_features=""
        export_filter="all_resources"
        include_filter=""
        exclude_filter=""
        export_path=""
        encryption_include_filters=""
        encryption_exclude_filters=""
        seed=0
        encrypt_pck=false
        encrypt_directory=false
        script_export_mode=2

        [preset.0.options]

        custom_template/debug=""
        custom_template/release=""
        gradle_build/use_gradle_build=true
        gradle_build/gradle_build_directory=""
        gradle_build/android_source_template=""
        gradle_build/compress_native_libraries=false
        gradle_build/export_format=0
        gradle_build/min_sdk=""
        gradle_build/target_sdk=""
        architectures/armeabi-v7a=false
        architectures/arm64-v8a=true
        architectures/x86=false
        architectures/x86_64=false
        version/code=1
        version/name=""
        package/unique_name="com.poingstudios.admob.sample"
        package/name="AdMob Sample"
        package/signed=true
        package/app_category=2
        package/retain_data_on_uninstall=false
        package/exclude_from_recents=false
        package/show_in_android_tv=false
        package/show_in_app_library=true
        package/show_as_launcher_app=false
        graphics/opengl_debug=false
        xr_features/xr_mode=0
        screen/immersive_mode=true
        screen/support_small=true
        screen/support_normal=true
        screen/support_large=true
        screen/support_xlarge=true
        EOF

    - name: Import Project Resources
      working-directory: platforms/godot_editor
      run: |
        # Set main scene to C# sample for this build
        sed -i 's|run/main_scene="uid://0esyp38ds6yg"|run/main_scene="res://addons/admob/csharp/sample/MainCSharpExample.tscn"|' project.godot
        timeout 120 godot --headless --import --quit || true

    - name: Build C# Solution
      working-directory: platforms/godot_editor
      run: dotnet build

    - name: Install Android Build Template
      working-directory: platforms/godot_editor
      run: |
        GODOT_VERSION=${{ needs.detect-latest.outputs.godot_version }}
        DOWNLOAD_VERSION="${GODOT_VERSION%.0}"
        mkdir -p android/build
        unzip ~/.local/share/godot/export_templates/${DOWNLOAD_VERSION}.stable.mono/android_source.zip -d android/build
        echo "${DOWNLOAD_VERSION}.stable.mono" > android/.build_version

    - name: Export APK
      working-directory: platforms/godot_editor
      run: |
        mkdir -p .output
        godot --headless --export-debug "Android" .output/AdMobAddon-CSharp.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: AdMobAddon-Android-CSharp-v${{ needs.detect-latest.outputs.godot_version }}-${{ github.event.pull_request.head.sha }}
        path: platforms/godot_editor/.output/AdMobAddon-CSharp.apk
        retention-days: 14

  build-ipa:
    name: "Build: Test Project (iOS IPA)"
    needs: [changes, detect-latest, build-ios]
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6

    - name: Download Godot
      run: |
        CV="${{ needs.detect-latest.outputs.godot_version }}"
        DOWNLOAD_VERSION="${CV%.0}"
        if [[ "$CV" =~ (beta|rc|dev) ]]; then
          URL="https://github.com/godotengine/godot-builds/releases/download/${CV}/Godot_v${CV}_macos.universal.zip"
        else
          URL="https://github.com/godotengine/godot/releases/download/${DOWNLOAD_VERSION}-stable/Godot_v${DOWNLOAD_VERSION}-stable_macos.universal.zip"
        fi
        curl -LO "$URL"
        unzip -q *.zip
        rm -rf /Applications/Godot.app
        mv Godot.app /Applications/Godot.app

    - name: Download Export Templates
      run: |
        CV="${{ needs.detect-latest.outputs.godot_version }}"
        DOWNLOAD_VERSION="${CV%.0}"
        if [[ "$CV" =~ (beta|rc|dev) ]]; then
          URL="https://github.com/godotengine/godot-builds/releases/download/${CV}/Godot_v${CV}_export_templates.tpz"
        else
          URL="https://github.com/godotengine/godot/releases/download/${DOWNLOAD_VERSION}-stable/Godot_v${DOWNLOAD_VERSION}-stable_export_templates.tpz"
        fi
        curl -LO "$URL"
        mkdir -p ~/Library/Application\ Support/Godot/export_templates/${DOWNLOAD_VERSION}.stable
        unzip -q *.tpz
        mv templates/* ~/Library/Application\ Support/Godot/export_templates/${DOWNLOAD_VERSION}.stable/

    - name: Download iOS Plugin Binaries
      uses: actions/download-artifact@v4
      with:
        name: poing-godot-admob-ios-v${{ needs.detect-latest.outputs.godot_version }}-${{ github.event.pull_request.head.sha }}
        path: platforms/ios/bin/release

    - name: Extract and Prepare Plugin
      working-directory: platforms/godot_editor
      run: |
        mkdir -p ios/plugins
        unzip -o ../ios/bin/release/poing-godot-admob-ios-v${{ needs.detect-latest.outputs.godot_version }}.zip -d ios/plugins/

    - name: Generate Export Presets
      working-directory: platforms/godot_editor
      run: |
        cat > export_presets.cfg <<'EOF'
        [preset.0]
        name="iOS"
        platform="iOS"
        runnable=true
        dedicated_server=false
        custom_features=""
        export_filter="all_resources"
        include_filter=""
        exclude_filter=""
        export_path=""
        encryption_include_filters=""
        encryption_exclude_filters=""
        seed=0
        encrypt_pck=false
        encrypt_directory=false
        script_export_mode=2

        [preset.0.options]
        application/targeted_device_family=2
        application/min_ios_version="14.0"
        application/app_store_team_id="123"
        application/bundle_identifier="com.poingstudios.admob"
        plugins_plist/GADApplicationIdentifier="ca-app-pub-3940256099942544~1458002511"
        plugins/AdMob=true
        application/export_project_only=true
        EOF

    - name: Import Project Resources
      working-directory: platforms/godot_editor
      run: |
        timeout 120 /Applications/Godot.app/Contents/MacOS/Godot --headless --import --quit || true

    - name: Export Godot Sample Project
      working-directory: platforms/godot_editor
      run: |
        mkdir -p exports/ios
        /Applications/Godot.app/Contents/MacOS/Godot --headless --export-debug "iOS" exports/ios/AdMobSample.xcodeproj || true
        test -d exports/ios/AdMobSample.xcodeproj || { echo "::error::Xcode project was not generated"; exit 1; }

    - name: Patch Xcode Project for SPM
      run: |
        cat << 'EOF' > patch_pbxproj.py
        import sys
        import os
        def patch_pbxproj(path):
            with open(path, "r") as f: content = f.read()
            if "AD0000000000000000000001" in content: return
            local_ref_id, product_dep_id, build_file_id = "AD0000000000000000000001", "AD0000000000000000000002", "AD0000000000000000000003"
            if "/* Begin XCLocalSwiftPackageReference section */" not in content:
                content = content.replace("/* End PBXGroup section */", "/* End PBXGroup section */\n\n/* Begin XCLocalSwiftPackageReference section */\n/* End XCLocalSwiftPackageReference section */")
            if "/* Begin XCSwiftPackageProductDependency section */" not in content:
                content = content.replace("/* End XCLocalSwiftPackageReference section */", "/* End XCLocalSwiftPackageReference section */\n\n/* Begin XCSwiftPackageProductDependency section */\n/* End XCSwiftPackageProductDependency section */")
            content = content.replace("/* End XCLocalSwiftPackageReference section */", f'\t\t{local_ref_id} /* XCLocalSwiftPackageReference "admob_spm" */ = {{isa = XCLocalSwiftPackageReference; relativePath = "admob_spm"; }};\n' + "/* End XCLocalSwiftPackageReference section */")
            content = content.replace("/* End XCSwiftPackageProductDependency section */", f'\t\t{product_dep_id} /* PoingGodotAdMobDeps */ = {{isa = XCSwiftPackageProductDependency; package = {local_ref_id} /* XCLocalSwiftPackageReference "admob_spm" */; productName = "PoingGodotAdMobDeps"; }};\n' + "/* End XCSwiftPackageProductDependency section */")
            content = content.replace("/* Begin PBXBuildFile section */", "/* Begin PBXBuildFile section */\n" + f"\t\t{build_file_id} /* PoingGodotAdMobDeps in Frameworks */ = {{isa = PBXBuildFile; productRef = {product_dep_id} /* PoingGodotAdMobDeps */; }};\n")
            content = content.replace("productRefGroup =", f"packageReferences = (\n\t\t\t\t{local_ref_id} /* XCLocalSwiftPackageReference \"admob_spm\" */,\n\t\t\t);\n\t\t\tproductRefGroup =")
            content = content.replace("buildRules = (", f"packageProductDependencies = (\n\t\t\t\t{product_dep_id} /* PoingGodotAdMobDeps */,\n\t\t\t);\n\t\t\tbuildRules = (")
            fw_start = content.find("isa = PBXFrameworksBuildPhase;")
            if fw_start != -1:
                files_start = content.find("files = (", fw_start)
                if files_start != -1: content = content[:files_start + 9] + f"\n\t\t\t\t{build_file_id} /* PoingGodotAdMobDeps in Frameworks */," + content[files_start+9:]
            
            # Enable Swift support and search paths in all build configurations to link Swift runtimes and SPM dependencies
            content = content.replace("buildSettings = {", 'buildSettings = {\n\t\t\t\tSWIFT_VERSION = 5.0;\n\t\t\t\tLIBRARY_SEARCH_PATHS = (\n\t\t\t\t\t"$(inherited)",\n\t\t\t\t\t"$(SDKROOT)/usr/lib/swift",\n\t\t\t\t\t"$(TOOLCHAIN_DIR)/usr/lib/swift/$(PLATFORM_NAME)",\n\t\t\t\t);')
            
            with open(path, "w") as f: f.write(content)
        if __name__ == "__main__": patch_pbxproj(sys.argv[1])
        EOF
        python3 patch_pbxproj.py platforms/godot_editor/exports/ios/AdMobSample.xcodeproj/project.pbxproj

    - name: Build and Package Test Simulator App
      working-directory: platforms/godot_editor/exports/ios
      run: |
        xcodebuild build \
          -project AdMobSample.xcodeproj \
          -scheme AdMobSample \
          -configuration Debug \
          -sdk iphonesimulator \
          -derivedDataPath build_output \
          ARCHS=x86_64 \
          ONLY_ACTIVE_ARCH=NO \
          EXCLUDED_ARCHS=arm64 \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES
        
        APP_PATH=$(find build_output/Build/Products/Debug-iphonesimulator -name "*.app" -type d | head -n 1)
        
        if [ -z "$APP_PATH" ]; then
          echo "::error::Could not find .app file in build_output. Build might have failed."
          exit 1
        fi
        
        APP_NAME=$(basename "$APP_PATH")
        cp -R "$APP_PATH" ./
        zip -qr "AdMobAddon-iOS-Simulator-GDScript-v${{ needs.detect-latest.outputs.godot_version }}.zip" "$APP_NAME"
        rm -rf "$APP_NAME"

    - name: Upload Simulator App artifact
      uses: actions/upload-artifact@v4
      with:
        name: AdMobAddon-iOS-Simulator-GDScript-v${{ needs.detect-latest.outputs.godot_version }}-${{ github.event.pull_request.head.sha }}
        path: platforms/godot_editor/exports/ios/*.zip
        retention-days: 14

  build-ipa-csharp:
    name: "Build: Test Project (iOS IPA C#)"
    needs: [changes, detect-latest, build-ios]
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Download Godot (.NET)
      run: |
        CV="${{ needs.detect-latest.outputs.godot_version }}"
        DOWNLOAD_VERSION="${CV%.0}"
        if [[ "$CV" =~ (beta|rc|dev) ]]; then
          URL="https://github.com/godotengine/godot-builds/releases/download/${CV}/Godot_v${CV}_mono_macos.universal.zip"
        else
          URL="https://github.com/godotengine/godot/releases/download/${DOWNLOAD_VERSION}-stable/Godot_v${DOWNLOAD_VERSION}-stable_mono_macos.universal.zip"
        fi
        curl -LO "$URL"
        unzip -q *.zip
        rm -rf /Applications/Godot.app
        mv Godot_mono.app /Applications/Godot.app

    - name: Download Export Templates
      run: |
        CV="${{ needs.detect-latest.outputs.godot_version }}"
        DOWNLOAD_VERSION="${CV%.0}"
        if [[ "$CV" =~ (beta|rc|dev) ]]; then
          URL="https://github.com/godotengine/godot-builds/releases/download/${CV}/Godot_v${CV}_mono_export_templates.tpz"
        else
          URL="https://github.com/godotengine/godot/releases/download/${DOWNLOAD_VERSION}-stable/Godot_v${DOWNLOAD_VERSION}-stable_mono_export_templates.tpz"
        fi
        curl -LO "$URL"
        mkdir -p ~/Library/Application\ Support/Godot/export_templates/${DOWNLOAD_VERSION}.stable.mono
        unzip -q *.tpz
        mv templates/* ~/Library/Application\ Support/Godot/export_templates/${DOWNLOAD_VERSION}.stable.mono/

    - name: Download iOS Plugin Binaries
      uses: actions/download-artifact@v4
      with:
        name: poing-godot-admob-ios-v${{ needs.detect-latest.outputs.godot_version }}-${{ github.event.pull_request.head.sha }}
        path: platforms/ios/bin/release

    - name: Extract and Prepare Plugin
      working-directory: platforms/godot_editor
      run: |
        mkdir -p ios/plugins
        unzip -o ../ios/bin/release/poing-godot-admob-ios-v${{ needs.detect-latest.outputs.godot_version }}.zip -d ios/plugins/

    - name: Generate Export Presets
      working-directory: platforms/godot_editor
      run: |
        cat > export_presets.cfg <<'EOF'
        [preset.0]
        name="iOS"
        platform="iOS"
        runnable=true
        dedicated_server=false
        custom_features=""
        export_filter="all_resources"
        include_filter=""
        exclude_filter=""
        export_path=""
        encryption_include_filters=""
        encryption_exclude_filters=""
        seed=0
        encrypt_pck=false
        encrypt_directory=false
        script_export_mode=2

        [preset.0.options]
        application/targeted_device_family=2
        application/min_ios_version="14.0"
        application/app_store_team_id="123"
        application/bundle_identifier="com.poingstudios.admob"
        plugins_plist/GADApplicationIdentifier="ca-app-pub-3940256099942544~1458002511"
        plugins/AdMob=true
        EOF

    - name: Import Project Resources
      working-directory: platforms/godot_editor
      run: |
        sed -i '' 's|run/main_scene="uid://0esyp38ds6yg"|run/main_scene="res://addons/admob/csharp/sample/MainCSharpExample.tscn"|' project.godot
        timeout 120 /Applications/Godot.app/Contents/MacOS/Godot --headless --import --quit || true

    - name: Build C# Solution
      working-directory: platforms/godot_editor
      run: dotnet build

    - name: Export Godot Sample Project
      working-directory: platforms/godot_editor
      run: |
        mkdir -p exports/ios
        /Applications/Godot.app/Contents/MacOS/Godot --headless --export-debug "iOS" exports/ios/AdMobSample.xcodeproj || true
        test -d exports/ios/AdMobSample.xcodeproj || { echo "::error::Xcode project was not generated"; exit 1; }

    - name: Patch Xcode Project for SPM
      run: |
        cat << 'EOF' > patch_pbxproj.py
        import sys
        import os
        def patch_pbxproj(path):
            with open(path, "r") as f: content = f.read()
            if "AD0000000000000000000001" in content: return
            local_ref_id, product_dep_id, build_file_id = "AD0000000000000000000001", "AD0000000000000000000002", "AD0000000000000000000003"
            if "/* Begin XCLocalSwiftPackageReference section */" not in content:
                content = content.replace("/* End PBXGroup section */", "/* End PBXGroup section */\n\n/* Begin XCLocalSwiftPackageReference section */\n/* End XCLocalSwiftPackageReference section */")
            if "/* Begin XCSwiftPackageProductDependency section */" not in content:
                content = content.replace("/* End XCLocalSwiftPackageReference section */", "/* End XCLocalSwiftPackageReference section */\n\n/* Begin XCSwiftPackageProductDependency section */\n/* End XCSwiftPackageProductDependency section */")
            content = content.replace("/* End XCLocalSwiftPackageReference section */", f'\t\t{local_ref_id} /* XCLocalSwiftPackageReference "admob_spm" */ = {{isa = XCLocalSwiftPackageReference; relativePath = "admob_spm"; }};\n' + "/* End XCLocalSwiftPackageReference section */")
            content = content.replace("/* End XCSwiftPackageProductDependency section */", f'\t\t{product_dep_id} /* PoingGodotAdMobDeps */ = {{isa = XCSwiftPackageProductDependency; package = {local_ref_id} /* XCLocalSwiftPackageReference "admob_spm" */; productName = "PoingGodotAdMobDeps"; }};\n' + "/* End XCSwiftPackageProductDependency section */")
            content = content.replace("/* Begin PBXBuildFile section */", "/* Begin PBXBuildFile section */\n" + f"\t\t{build_file_id} /* PoingGodotAdMobDeps in Frameworks */ = {{isa = PBXBuildFile; productRef = {product_dep_id} /* PoingGodotAdMobDeps */; }};\n")
            content = content.replace("productRefGroup =", f"packageReferences = (\n\t\t\t\t{local_ref_id} /* XCLocalSwiftPackageReference \"admob_spm\" */,\n\t\t\t);\n\t\t\tproductRefGroup =")
            content = content.replace("buildRules = (", f"packageProductDependencies = (\n\t\t\t\t{product_dep_id} /* PoingGodotAdMobDeps */,\n\t\t\t);\n\t\t\tbuildRules = (")
            fw_start = content.find("isa = PBXFrameworksBuildPhase;")
            if fw_start != -1:
                files_start = content.find("files = (", fw_start)
                if files_start != -1: content = content[:files_start + 9] + f"\n\t\t\t\t{build_file_id} /* PoingGodotAdMobDeps in Frameworks */," + content[files_start+9:]
            with open(path, "w") as f: f.write(content)
        if __name__ == "__main__": patch_pbxproj(sys.argv[1])
        EOF
        python3 patch_pbxproj.py platforms/godot_editor/exports/ios/AdMobSample.xcodeproj/project.pbxproj

    - name: Build and Package Test Simulator App
      working-directory: platforms/godot_editor/exports/ios
      run: |
        xcodebuild build \
          -project AdMobSample.xcodeproj \
          -scheme AdMobSample \
          -configuration Debug \
          -sdk iphonesimulator \
          -derivedDataPath build_output \
          ARCHS=x86_64 \
          ONLY_ACTIVE_ARCH=NO \
          EXCLUDED_ARCHS=arm64 \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES
        
        APP_PATH=$(find build_output/Build/Products/Debug-iphonesimulator -name "*.app" -type d | head -n 1)
        
        if [ -z "$APP_PATH" ]; then
          echo "::error::Could not find .app file in build_output. Build might have failed."
          exit 1
        fi
        
        APP_NAME=$(basename "$APP_PATH")
        cp -R "$APP_PATH" ./
        zip -qr "AdMobAddon-iOS-Simulator-CSharp-v${{ needs.detect-latest.outputs.godot_version }}.zip" "$APP_NAME"
        rm -rf "$APP_NAME"

    - name: Upload Simulator App artifact
      uses: actions/upload-artifact@v4
      with:
        name: AdMobAddon-iOS-Simulator-CSharp-v${{ needs.detect-latest.outputs.godot_version }}-${{ github.event.pull_request.head.sha }}
        path: platforms/godot_editor/exports/ios/*.zip
        retention-days: 14


  gdlint:
    name: "Lint: GDScript"
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python 3.x
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install gdlint
      run: |
        python -m pip install --upgrade pip
        pip install gdtoolkit

    - name: Run gdlint
      run: |
        gdlint platforms/godot_editor/addons/
  # FINAL STATUS JOB: This is what you should set as mandatory in GitHub
  pr-validation-status:
    name: "PR Validation Status"
    needs: [changes, gdlint, build-apk, build-apk-csharp, build-ios, build-ipa, build-ipa-csharp]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check build results
        run: |
          # If code changes occurred, we MUST have successful builds
          if [[ "${{ needs.changes.outputs.code }}" == "true" ]]; then
            if [[ "${{ needs.build-apk.result }}" == "success" && "${{ needs.build-apk-csharp.result }}" == "success" && "${{ needs.build-ios.result }}" == "success" && "${{ needs.build-ipa.result }}" == "success" && "${{ needs.build-ipa-csharp.result }}" == "success" ]]; then
              echo "All code builds passed."
              exit 0
            else
              echo "Code builds failed."
              exit 1
            fi
          else
            echo "No code changes detected, skipping builds and marking as success."
            exit 0
          fi
