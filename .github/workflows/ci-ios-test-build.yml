name: "[CI] iOS Test IPA Build"

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'platforms/ios/**'
      - '.github/workflows/ci-ios-test-build.yml'

jobs:
  build-test-ipa:
    name: Build Test IPA (Sideload Ready)
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install SCons
        run: python -m pip install scons

      - name: Build Plugin Libraries (SCons)
        working-directory: platforms/ios
        run: |
          chmod +x ./scripts/build.sh
          ./scripts/build.sh 4.6.1 --clean

      - name: Compile Xcode Project (No Signing)
        working-directory: platforms/ios
        run: |
          xcodebuild build \
            -project PoingGodotAdMob.xcodeproj \
            -scheme PoingGodotAdMob \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Create IPA Package
        working-directory: platforms/ios
        run: |
          mkdir -p Payload
          APP_PATH=$(find build_output/Build/Products/Debug-iphoneos -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "::error::Could not find .app file in build_output. Build might have failed."
            exit 1
          fi
          
          echo "Found App at: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r PoingGodotAdMob-Test-Unsigned.ipa Payload/

      - name: Upload Test Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-ipa
          path: platforms/ios/PoingGodotAdMob-Test-Unsigned.ipa
          retention-days: 5
          if-no-files-found: error

      - name: Build Summary
        run: |
          echo "### 🚀 iOS Test Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "The generated .ipa file is ready for **Sideloading**." >> $GITHUB_STEP_SUMMARY
          echo "- **Method:** No-Sign (Fake Signing)" >> $GITHUB_STEP_SUMMARY
          echo "- **Usage:** Download the artifact and use AltStore or Sideloadly to install it on your device." >> $GITHUB_STEP_SUMMARY
