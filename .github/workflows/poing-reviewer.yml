name: Poing Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: 1. Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: 2. Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch Base Branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}:origin/${{ github.event.pull_request.base.ref }}

      - name: 3. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 4. Install Dependencies
        run: pip install requests

      - name: 5. Run Reviewer
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GEMMA_API_KEY: ${{ secrets.GEMMA_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          python -c '
          import os, requests, subprocess, json, sys

          gemma_key = os.environ["GEMMA_API_KEY"]
          github_token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]
          pr_number = os.environ["PR_NUMBER"]
          base_ref = os.environ["BASE_REF"]
          pr_title = os.environ["PR_TITLE"]

          diff = subprocess.check_output(["git", "diff", f"origin/{base_ref}...HEAD"]).decode("utf-8")

          max_chars = 30000
          if len(diff) > max_chars:
              diff = diff[:max_chars] + "\n\n... (diff truncated)"

          prompt = f"""You are Poing Reviewer, an AI code reviewer. Analyze the diff below and respond ONLY with the final review using this EXACT markdown template. Do NOT include any reasoning, analysis steps, or thinking — output ONLY the filled template.

          ---

          ## 📋 Summary

          _One or two sentences describing what this PR changes._

          ## 🔍 Findings

          | | File | Finding |
          |---|---|---|
          | 🔴 | `filename.ext` | Description of critical issue |
          | 🟡 | `filename.ext` | Description of warning |
          | 🟢 | `filename.ext` | Description of suggestion |

          _If no issues found, write: **No issues found. ✅**_

          ## 📌 Verdict

          **✅ Approved** / **🟡 Approved with suggestions** / **🔴 Changes requested**

          ---

          PR Title: {pr_title}

          ```diff
          {diff}
          ```"""

          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemma-4-31b-it:generateContent?key={gemma_key}"
          payload = {"contents": [{"parts": [{"text": prompt}]}]}

          resp = requests.post(url, json=payload)
          if resp.status_code != 200:
              print(f"API error: {resp.status_code} {resp.text}", file=sys.stderr)
              sys.exit(1)

          data = resp.json()
          if "candidates" not in data:
              print(f"Unexpected response: {json.dumps(data, indent=2)}", file=sys.stderr)
              sys.exit(1)

          # Extract only the non-thinking parts from the response
          parts = data["candidates"][0]["content"]["parts"]
          feedback = ""
          for part in parts:
              if not part.get("thought", False):
                  feedback += part.get("text", "")

          if not feedback.strip():
              print("No review content generated", file=sys.stderr)
              sys.exit(1)

          headers = {"Authorization": f"Bearer {github_token}", "Accept": "application/vnd.github.v3+json"}
          r = requests.post(
              f"https://api.github.com/repos/{repo}/pulls/{pr_number}/reviews",
              headers=headers, json={"body": feedback.strip(), "event": "COMMENT"}
          )
          if r.status_code >= 400:
              print(f"GitHub API error: {r.status_code} {r.text}", file=sys.stderr)
              sys.exit(1)

          print("Review posted successfully!")
          '