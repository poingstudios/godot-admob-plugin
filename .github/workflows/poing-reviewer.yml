name: Poing Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: 1. Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: 2. Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch Base Branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}:origin/${{ github.event.pull_request.base.ref }}

      - name: 3. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 4. Install Dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: 5. Run Reviewer
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GEMMA_API_KEY: ${{ secrets.GEMMA_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          MODEL_NAME: gemini-3.5-flash
          MAX_CHARS: 100000
        run: python .github/scripts/poing_reviewer.py