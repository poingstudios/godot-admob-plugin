name: Build APK on PR Comment

on:
  workflow_run:
    workflows: ["Build APK on PR"]
    types: [completed]

jobs:
  comment:
    name: Comment PR with result
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    permissions:
      pull-requests: write
      actions: read

    steps:
    - name: Get PR number
      id: pr
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        PR_NUMBER=$(gh api \
          "repos/${{ github.repository }}/pulls?head=${{ github.event.workflow_run.head_repository.owner.login }}:${{ github.event.workflow_run.head_branch }}&state=open" \
          --jq '.[0].number')

        echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT

    - name: Comment on success
      if: github.event.workflow_run.conclusion == 'success'
      uses: actions/github-script@v7
      with:
        script: |
          const prNumber = ${{ steps.pr.outputs.number }};
          if (!prNumber) {
            console.log('Could not determine PR number, skipping comment.');
            return;
          }

          const runId = ${{ github.event.workflow_run.id }};
          const commitSha = '${{ github.event.workflow_run.head_sha }}'.substring(0, 7);

          const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
            owner: context.repo.owner,
            repo: context.repo.repo,
            run_id: runId,
          });

          const artifact = artifacts.artifacts.find(a => a.name.startsWith('AdMobAddon-'));
          const godotVersion = artifact
            ? artifact.name.replace(/^AdMobAddon-v/, '').replace(/-[a-f0-9]+$/, '')
            : 'unknown';
          const artifactUrl = artifact
            ? `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}/artifacts/${artifact.id}`
            : `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

          const body = `✅ **APK Build Successful!** (Commit: \`${commitSha}\`)\n\nThe project has been exported as an APK for Godot ${godotVersion}.\n\n📦 [Download APK](${artifactUrl})`;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
          });

          const botComment = comments.find(comment =>
            comment.user.type === 'Bot' && comment.body.includes('Download APK')
          );

          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: body
            });
          } else {
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
          }

    - name: Comment on failure
      if: github.event.workflow_run.conclusion == 'failure'
      uses: actions/github-script@v7
      with:
        script: |
          const prNumber = ${{ steps.pr.outputs.number }};
          if (!prNumber) {
            console.log('Could not determine PR number, skipping comment.');
            return;
          }

          const runId = ${{ github.event.workflow_run.id }};
          const commitSha = '${{ github.event.workflow_run.head_sha }}'.substring(0, 7);
          const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

          const body = `❌ **APK Build Failed!** (Commit: \`${commitSha}\`)\n\n[View Logs](${runUrl})`;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
          });

          const botComment = comments.find(comment =>
            comment.user.type === 'Bot' && (comment.body.includes('Download APK') || comment.body.includes('Build Failed'))
          );

          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: body
            });
          } else {
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
          }
