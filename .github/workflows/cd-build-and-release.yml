name: "[Manual] Release All Platforms"

on: workflow_dispatch

jobs:
  check-release:
    name: Check if release already exists
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set plugin version
      run: |
        RAW_VERSION=$(grep "version=" platforms/godot_editor/addons/admob/plugin.cfg | cut -d'"' -f2)
        echo "PLUGIN_TAG=v${RAW_VERSION#v}" >> $GITHUB_ENV

    - name: Fail if release already exists
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if gh api "repos/${{ github.repository }}/releases/tags/${{ env.PLUGIN_TAG }}" > /dev/null 2>&1; then
          echo "::error::Release ${{ env.PLUGIN_TAG }} already exists. Bump the version before releasing."
          exit 1
        fi
        echo "No existing release found for ${{ env.PLUGIN_TAG }}. Proceeding..."

  android-template:
    name: Compiling Android (Godot ${{matrix.GODOT_VERSIONS}})
    needs: check-release
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        GODOT_VERSIONS: ["4.2.0", "4.2.1", "4.2.2", "4.3.0", "4.4.0", "4.4.1", "4.5.0", "4.5.1", "4.5.2", "4.6.0", "4.6.1"]

    steps:
    - uses: actions/checkout@v6

    - name: Set plugin version
      run: |
        RAW_VERSION=$(grep "version=" platforms/godot_editor/addons/admob/plugin.cfg | cut -d'"' -f2)
        echo "PLUGIN_TAG=v${RAW_VERSION#v}" >> $GITHUB_ENV

    - name: Build Plugins
      working-directory: platforms/android
      run: |
        chmod +x ./scripts/unix/download_godot.sh
        ./scripts/unix/download_godot.sh ${{matrix.GODOT_VERSIONS}}
        chmod +x ./gradlew
        ./gradlew build -PgodotVersion=${{matrix.GODOT_VERSIONS}}

    - name: Compress the artifact output
      working-directory: platforms/android
      run: |
        ./gradlew zipPlugins -PgodotVersion="${{matrix.GODOT_VERSIONS}}"

    - name: Upload binaries to artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-${{matrix.GODOT_VERSIONS}}
        path: platforms/android/.output/poing-godot-admob-android-v${{matrix.GODOT_VERSIONS}}.zip
        if-no-files-found: error
        retention-days: 1

  ios-template:
    name: Compiling iOS (Godot ${{matrix.GODOT_VERSIONS}})
    needs: check-release
    runs-on: "macos-latest"
    strategy:
      matrix:
        GODOT_VERSIONS: ["4.1.0", "4.1.1", "4.1.2", "4.1.3", "4.1.4", "4.2.0", "4.2.1", "4.2.2", "4.3.0", "4.4.0", "4.4.1", "4.5.0", "4.5.1", "4.5.2", "4.6.0", "4.6.1"]

    steps:
    - uses: actions/checkout@v6

    - name: Set plugin version
      run: |
        RAW_VERSION=$(grep "version=" platforms/godot_editor/addons/admob/plugin.cfg | cut -d'"' -f2)
        echo "PLUGIN_TAG=v${RAW_VERSION#v}" >> $GITHUB_ENV

    - name: Verify matrix
      run: |
        CV=${{matrix.GODOT_VERSIONS}}
        if [ ${#CV} -eq 1 ]; then CV="${CV}.0"; fi
        echo "CURRENT_GODOT_VERSION=${CV}" >> $GITHUB_ENV

    - name: Cache & Load Python/SPM
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install scons
      run: python -m pip install scons

    - name: Compiles the Source Code
      working-directory: platforms/ios
      run: |
        ./scripts/build.sh ${{env.CURRENT_GODOT_VERSION}}

    - name: Download Godot
      run: |
        curl -LO https://github.com/godotengine/godot/releases/download/${{env.CURRENT_GODOT_VERSION}}-stable/Godot_v${{env.CURRENT_GODOT_VERSION}}-stable_macos.universal.zip
        unzip Godot_v${{env.CURRENT_GODOT_VERSION}}-stable_macos.universal.zip
        mv Godot.app /Applications/Godot.app

    - name: Prepare Plugin in Sample Project
      run: |
        mkdir -p platforms/godot_editor/addons/admob/bin/ios
        cp -R platforms/ios/bin/xcframeworks/ads/poing-godot-admob-ads.release.xcframework platforms/godot_editor/addons/admob/bin/ios/
        cp -R platforms/ios/bin/xcframeworks/meta/poing-godot-admob-meta.release.xcframework platforms/godot_editor/addons/admob/bin/ios/
        cp -R platforms/ios/bin/xcframeworks/vungle/poing-godot-admob-vungle.release.xcframework platforms/godot_editor/addons/admob/bin/ios/
        cp platforms/ios/src/ads/config/poing-godot-admob-ads.gdip platforms/godot_editor/addons/admob/bin/ios/
        cp platforms/ios/src/mediation/vungle/config/poing-godot-admob-vungle.gdip platforms/godot_editor/addons/admob/bin/ios/
        cp platforms/ios/src/mediation/meta/config/poing-godot-admob-meta.gdip platforms/godot_editor/addons/admob/bin/ios/

    - name: Export Godot Sample Project
      run: |
        mkdir -p platforms/godot_editor/exports/ios
        /Applications/Godot.app/Contents/MacOS/Godot --headless --path platforms/godot_editor --export-release "iOS" exports/ios/AdMobSample.xcodeproj

    - name: Patch Xcode Project for SPM
      run: |
        cat << 'EOF' > patch_pbxproj.py
        import sys
        import os
        def patch_pbxproj(path):
            with open(path, "r") as f: content = f.read()
            if "AD0000000000000000000001" in content: return
            local_ref_id, product_dep_id, build_file_id = "AD0000000000000000000001", "AD0000000000000000000002", "AD0000000000000000000003"
            if "/* Begin XCLocalSwiftPackageReference section */" not in content:
                content = content.replace("/* End PBXGroup section */", "/* End PBXGroup section */\n\n/* Begin XCLocalSwiftPackageReference section */\n/* End XCLocalSwiftPackageReference section */")
            if "/* Begin XCSwiftPackageProductDependency section */" not in content:
                content = content.replace("/* End XCLocalSwiftPackageReference section */", "/* End XCLocalSwiftPackageReference section */\n\n/* Begin XCSwiftPackageProductDependency section */\n/* End XCSwiftPackageProductDependency section */")
            content = content.replace("/* End XCLocalSwiftPackageReference section */", f'\t\t{local_ref_id} /* XCLocalSwiftPackageReference "." */ = {{isa = XCLocalSwiftPackageReference; relativePath = "."; }};\n' + "/* End XCLocalSwiftPackageReference section */")
            content = content.replace("/* End XCSwiftPackageProductDependency section */", f'\t\t{product_dep_id} /* PoingGodotAdMobDeps */ = {{isa = XCSwiftPackageProductDependency; package = {local_ref_id} /* XCLocalSwiftPackageReference "." */; productName = "PoingGodotAdMobDeps"; }};\n' + "/* End XCSwiftPackageProductDependency section */")
            content = content.replace("/* Begin PBXBuildFile section */", "/* Begin PBXBuildFile section */\n" + f"\t\t{build_file_id} /* PoingGodotAdMobDeps in Frameworks */ = {{isa = PBXBuildFile; productRef = {product_dep_id} /* PoingGodotAdMobDeps */; }};\n")
            content = content.replace("productRefGroup =", f"packageReferences = (\n\t\t\t\t{local_ref_id} /* XCLocalSwiftPackageReference \".\" */,\n\t\t\t);\n\t\t\tproductRefGroup =")
            content = content.replace("buildRules = (", f"packageProductDependencies = (\n\t\t\t\t{product_dep_id} /* PoingGodotAdMobDeps */,\n\t\t\t);\n\t\t\tbuildRules = (")
            fw_start = content.find("isa = PBXFrameworksBuildPhase;")
            if fw_start != -1:
                files_start = content.find("files = (", fw_start)
                if files_start != -1: content = content[:files_start + 9] + f"\n\t\t\t\t{build_file_id} /* PoingGodotAdMobDeps in Frameworks */," + content[files_start+9:]
            with open(path, "w") as f: f.write(content)
        if __name__ == "__main__": patch_pbxproj(sys.argv[1])
        EOF
        python3 patch_pbxproj.py platforms/godot_editor/exports/ios/AdMobSample.xcodeproj/project.pbxproj

    - name: Build and Package Test IPA
      working-directory: platforms/godot_editor/exports/ios
      run: |
        xcodebuild build -project AdMobSample.xcodeproj -scheme AdMobSample -configuration Debug -sdk iphoneos -derivedDataPath build_output CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" AD_HOC_CODE_SIGNING_ALLOWED=YES
        mkdir -p Payload
        APP_PATH=$(find build_output/Build/Products/Debug-iphoneos -name "*.app" -type d | head -n 1)
        if [ -n "$APP_PATH" ]; then
          cp -r "$APP_PATH" Payload/
          zip -qr "AdMobSample-Test-v${{env.CURRENT_GODOT_VERSION}}.ipa" Payload/
        fi

    - name: Upload binaries to artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-${{matrix.GODOT_VERSIONS}}
        path: |
          platforms/ios/bin/release/*.zip
          platforms/godot_editor/exports/ios/*.ipa
        if-no-files-found: error
        retention-days: 1

  godot_editor:
    name: Compiling Godot Editor Plugin
    needs: check-release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Compress Godot Editor Plugin
      run: ./.github/scripts/compress_editor_plugin.sh

    - name: Upload zip to artifact
      uses: actions/upload-artifact@v4
      with:
        name: godot-editor
        path: platforms/godot_editor/${{ env.ZIP_NAME }}
        if-no-files-found: error
        retention-days: 1

  release-finalize:
    name: "🚀 Finalize and Publish Release"
    needs: [android-template, ios-template, godot_editor]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set plugin version
      run: |
        RAW_VERSION=$(grep "version=" platforms/godot_editor/addons/admob/plugin.cfg | cut -d'"' -f2)
        echo "PLUGIN_TAG=v${RAW_VERSION#v}" >> $GITHUB_ENV

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-artifacts
        merge-multiple: true

    - name: Finalize and Generate Release Notes
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create ${{ env.PLUGIN_TAG }} release-artifacts/* --title "${{ env.PLUGIN_TAG }}" --generate-notes

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.8'

    - name: Install requests
      run: pip install requests
      
    - name: Upload to Godot Asset Library
      env:
        ASSET_LIB_USER: ${{ secrets.ASSET_LIBRARY_USERNAME }}
        ASSET_LIB_PASS: ${{ secrets.ASSET_LIBRARY_PASSWORD }}
        VERSION: ${{ env.PLUGIN_TAG }}
        COMMIT_HASH: ${{ github.sha }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        python3 .github/scripts/push.py