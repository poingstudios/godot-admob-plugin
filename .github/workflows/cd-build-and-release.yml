name: "[Manual] Release All Platforms"

on: workflow_dispatch

jobs:
  check-release:
    name: Check if release already exists
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set plugin version
      run: |
        RAW_VERSION=$(grep "version=" platforms/godot_editor/addons/admob/plugin.cfg | cut -d'"' -f2)
        echo "PLUGIN_TAG=v${RAW_VERSION#v}" >> $GITHUB_ENV

    - name: Fail if release already exists
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if gh api "repos/${{ github.repository }}/releases/tags/${{ env.PLUGIN_TAG }}" > /dev/null 2>&1; then
          echo "::error::Release ${{ env.PLUGIN_TAG }} already exists. Bump the version before releasing."
          exit 1
        fi
        echo "No existing release found for ${{ env.PLUGIN_TAG }}. Proceeding..."

  android-template:
    name: Compiling Android (Godot ${{matrix.GODOT_VERSIONS}})
    needs: check-release
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        GODOT_VERSIONS: ["4.2.0", "4.2.1", "4.2.2", "4.3.0", "4.4.0", "4.4.1", "4.5.0", "4.5.1", "4.6.0", "4.6.1"]

    steps:
    - uses: actions/checkout@v6

    - name: Set plugin version
      run: |
        RAW_VERSION=$(grep "version=" platforms/godot_editor/addons/admob/plugin.cfg | cut -d'"' -f2)
        echo "PLUGIN_TAG=v${RAW_VERSION#v}" >> $GITHUB_ENV

    - name: Build Plugins
      working-directory: platforms/android
      run: |
        chmod +x ./gradlew
        ./gradlew build -PgodotVersion=${{matrix.GODOT_VERSIONS}}

    - name: Compress the artifact output
      working-directory: platforms/android
      run: |
        ./gradlew zipPlugins -PgodotVersion="${{matrix.GODOT_VERSIONS}}"

    - name: Upload binaries to release
      uses: svenstaro/upload-release-action@v2
      with:
        target_commit: ${{ github.ref_name }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: platforms/android/.output/poing-godot-admob-android-v${{matrix.GODOT_VERSIONS}}.zip
        tag: ${{ env.PLUGIN_TAG }}
        release_name: ${{ env.PLUGIN_TAG }}
        overwrite: true

  ios-template:
    name: Compiling iOS (Godot ${{matrix.GODOT_VERSIONS}})
    needs: check-release
    runs-on: "macos-latest"
    strategy:
      matrix:
        GODOT_VERSIONS: ["4.1.0", "4.1.1", "4.1.2", "4.1.3", "4.1.4", "4.2.0", "4.2.1", "4.2.2", "4.3.0", "4.4.0", "4.4.1", "4.5.0", "4.5.1", "4.6.0", "4.6.1"]

    steps:
    - uses: actions/checkout@v6

    - name: Set plugin version
      run: |
        RAW_VERSION=$(grep "version=" platforms/godot_editor/addons/admob/plugin.cfg | cut -d'"' -f2)
        echo "PLUGIN_TAG=v${RAW_VERSION#v}" >> $GITHUB_ENV

    - name: Verify matrix
      run: |
        CV=${{matrix.GODOT_VERSIONS}}
        if [ ${#CV} -eq 1 ]; then CV="${CV}.0"; fi
        echo "CURRENT_GODOT_VERSION=${CV}" >> $GITHUB_ENV

    - name: Cache & Load Python/SPM
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install scons
      run: python -m pip install scons

    - name: Compiles the Source Code
      working-directory: platforms/ios
      run: |
        ./scripts/build.sh ${{env.CURRENT_GODOT_VERSION}}

    - name: Build Test IPA (No Signing)
      working-directory: platforms/ios
      run: |
        xcodebuild build \
          -project PoingGodotAdMob.xcodeproj \
          -scheme PoingGodotAdMob \
          -configuration Debug \
          -sdk iphoneos \
          -derivedDataPath build_output \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES

    - name: Package Test IPA
      working-directory: platforms/ios
      run: |
        mkdir -p Payload
        APP_PATH=$(find build_output/Build/Products/Debug-iphoneos -name "*.app" -type d | head -n 1)
        if [ -n "$APP_PATH" ]; then
          cp -r "$APP_PATH" Payload/
          zip -r "PoingGodotAdMob-Test-v${{env.CURRENT_GODOT_VERSION}}.ipa" Payload/
        fi

    - name: Upload binaries to release
      uses: svenstaro/upload-release-action@v2
      with:
        target_commit: ${{ github.ref_name }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: platforms/ios/bin/release/*.zip
        file_glob: true
        tag: ${{ env.PLUGIN_TAG }}
        release_name: ${{ env.PLUGIN_TAG }}
        overwrite: true

    - name: Upload Test IPA to release
      uses: svenstaro/upload-release-action@v2
      with:
        target_commit: ${{ github.ref_name }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: platforms/ios/*.ipa
        file_glob: true
        tag: ${{ env.PLUGIN_TAG }}
        release_name: ${{ env.PLUGIN_TAG }}
        overwrite: true

  godot_editor:
    name: Compiling Godot Editor Plugin
    needs: check-release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Compress Godot Editor Plugin
      working-directory: platforms/godot_editor
      run: |
        RAW_VERSION=$(grep "version=" addons/admob/plugin.cfg | cut -d'"' -f2)
        CH_VERSION=${RAW_VERSION#v}
        zip -r "poing-godot-admob-v${CH_VERSION}.zip" addons/admob
        echo "ZIP_NAME=poing-godot-admob-v${CH_VERSION}.zip" >> $GITHUB_ENV
        echo "PLUGIN_TAG=v${CH_VERSION}" >> $GITHUB_ENV

    - name: Upload zip to release
      uses: svenstaro/upload-release-action@v2
      with:
        target_commit: ${{ github.ref_name }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: platforms/godot_editor/${{ env.ZIP_NAME }}
        tag: ${{ env.PLUGIN_TAG }}
        release_name: ${{ env.PLUGIN_TAG }}
        overwrite: true

  release-finalize:
    name: "🚀 Finalize and Publish Release"
    needs: [android-template, ios-template, godot_editor]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set plugin version
      run: |
        RAW_VERSION=$(grep "version=" platforms/godot_editor/addons/admob/plugin.cfg | cut -d'"' -f2)
        echo "PLUGIN_TAG=v${RAW_VERSION#v}" >> $GITHUB_ENV

    - name: Edit release info
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release edit "${{ env.PLUGIN_TAG }}" --title "${{ env.PLUGIN_TAG }}" --notes "Release ${{ env.PLUGIN_TAG }}" --draft=false --prerelease=false

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.8'

    - name: Install requests
      run: pip install requests
      
    - name: Upload to Godot Asset Library
      env:
        ASSET_LIB_USER: ${{ secrets.ASSET_LIBRARY_USERNAME }}
        ASSET_LIB_PASS: ${{ secrets.ASSET_LIBRARY_PASSWORD }}
        VERSION: ${{ env.PLUGIN_TAG }}
        COMMIT_HASH: ${{ github.sha }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        python3 .github/scripts/push.py
