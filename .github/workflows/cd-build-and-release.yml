name: "CD - Build and Release"

on:
  schedule:
    - cron: '0 0 * * *' # Every day at midnight UTC
  workflow_dispatch:
    inputs:
      type:
        description: 'Build Type'
        required: true
        type: choice
        options:
          - 'Release'
          - 'Nightly'
        default: 'Release'
      force:
        description: 'Force nightly build even if no new commits exist?'
        type: boolean
        default: false

permissions:
  contents: write # Required to create/delete GitHub releases and tags

jobs:
  initialize:
    name: Determine Build Type and Version
    runs-on: ubuntu-latest
    if: github.repository == 'poingstudios/godot-admob-plugin' || github.event_name == 'workflow_dispatch'
    outputs:
      should_build: ${{ steps.setup.outputs.should_build }}
      build_type: ${{ steps.setup.outputs.build_type }}
      version: ${{ steps.setup.outputs.version }}
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Setup and Validation
      id: setup
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Determine build type
        if [ "${{ github.event_name }}" = "schedule" ]; then
          BUILD_TYPE="Nightly"
        else
          BUILD_TYPE="${{ github.event.inputs.type }}"
        fi

        echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT
        echo "Build type determined: $BUILD_TYPE"

        # Fetch base version from plugin.cfg
        BASE_VERSION=$(grep "version=" platforms/godot_editor/addons/admob/plugin.cfg | cut -d'"' -f2)
        VERSION_TAG="v${BASE_VERSION#v}"

        if [ "$BUILD_TYPE" = "Release" ]; then
          if gh api "repos/${{ github.repository }}/releases/tags/${VERSION_TAG}" > /dev/null 2>&1; then
            echo "::error::Release ${VERSION_TAG} already exists. Bump the version in plugin.cfg before releasing."
            exit 1
          fi
          echo "Release ${VERSION_TAG} does not exist. Proceeding with release build."
          echo "should_build=true" >> $GITHUB_OUTPUT
          echo "version=${VERSION_TAG}" >> $GITHUB_OUTPUT
        else
          # Nightly
          SHORT_SHA=$(git rev-parse --short HEAD)
          NIGHTLY_VERSION="${VERSION_TAG}-nightly.${SHORT_SHA}"
          echo "version=$NIGHTLY_VERSION" >> $GITHUB_OUTPUT

          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "Force build requested."
            echo "should_build=true" >> $GITHUB_OUTPUT
          elif gh release view "$NIGHTLY_VERSION" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Nightly release $NIGHTLY_VERSION already exists. Skipping build."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "Nightly release $NIGHTLY_VERSION does not exist. Starting build."
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi
        fi

  android-template:
    name: Compiling Android (Godot ${{matrix.GODOT_VERSIONS}})
    needs: initialize
    if: needs.initialize.outputs.should_build == 'true'
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        GODOT_VERSIONS: ["4.2.0", "4.2.1", "4.2.2", "4.3.0", "4.4.0", "4.4.1", "4.5.0", "4.5.1", "4.5.2", "4.6.0", "4.6.1", "4.6.2", "4.6.3", "4.7.0", "4.7.1"]
    steps:
    - uses: actions/checkout@v7

    - name: Cache Gradle
      uses: actions/cache@v6
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: android-gradle-${{ matrix.GODOT_VERSIONS }}-${{ hashFiles('platforms/android/**/*.gradle*', 'platforms/android/gradle.properties') }}
        restore-keys: |
          android-gradle-${{ matrix.GODOT_VERSIONS }}-
          android-gradle-

    - name: Build Plugins
      working-directory: platforms/android
      run: |
        chmod +x ./scripts/unix/download_godot.sh
        ./scripts/unix/download_godot.sh ${{matrix.GODOT_VERSIONS}}
        chmod +x ./gradlew
        ./gradlew build -PgodotVersion=${{matrix.GODOT_VERSIONS}}

    - name: Compress the artifact output
      working-directory: platforms/android
      run: |
        ./gradlew zipPlugins -PgodotVersion="${{matrix.GODOT_VERSIONS}}"

    - name: Upload binaries to artifact
      uses: actions/upload-artifact@v7
      with:
        name: android-${{matrix.GODOT_VERSIONS}}
        path: platforms/android/.output/android-template-v${{matrix.GODOT_VERSIONS}}.zip
        if-no-files-found: error
        retention-days: 1

  ios-template:
    name: Compiling iOS (Godot ${{matrix.GODOT_VERSIONS}})
    needs: initialize
    if: needs.initialize.outputs.should_build == 'true'
    runs-on: "macos-latest"
    strategy:
      matrix:
        GODOT_VERSIONS: ["4.1.0", "4.1.1", "4.1.2", "4.1.3", "4.1.4", "4.2.0", "4.2.1", "4.2.2", "4.3.0", "4.4.0", "4.4.1", "4.5.0", "4.5.1", "4.5.2", "4.6.0", "4.6.1", "4.6.2", "4.6.3", "4.7.0", "4.7.1"]
    steps:
    - uses: actions/checkout@v7

    - name: Verify matrix
      run: |
        CV=${{matrix.GODOT_VERSIONS}}
        if [ ${#CV} -eq 1 ]; then CV="${CV}.0"; fi
        echo "CURRENT_GODOT_VERSION=${CV}" >> $GITHUB_ENV

    - name: Cache & Load Python/SPM
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install scons
      run: python -m pip install scons

    - name: Load .scons_cache directory
      uses: actions/cache@v6
      with:
        path: ${{ github.workspace }}/platforms/ios/godot/.scons_cache/
        key: scons-ios-${{ env.CURRENT_GODOT_VERSION }}-${{ hashFiles('platforms/ios/SConstruct', 'platforms/ios/scripts/**') }}
        restore-keys: |
          scons-ios-${{ env.CURRENT_GODOT_VERSION }}-
          scons-ios-

    - name: Cache SPM dependencies
      uses: actions/cache@v6
      with:
        path: platforms/ios/.build
        key: spm-${{ hashFiles('platforms/ios/Package.swift', 'platforms/ios/Package.resolved') }}
        restore-keys: |
          spm-

    - name: Compiles the Source Code
      working-directory: platforms/ios
      env:
        SCONS_CACHE: ${{ github.workspace }}/platforms/ios/godot/.scons_cache/
      run: |
        ./scripts/build.sh ${{env.CURRENT_GODOT_VERSION}}

    - name: Upload binaries to artifact
      uses: actions/upload-artifact@v7
      with:
        name: ios-${{matrix.GODOT_VERSIONS}}
        path: platforms/ios/bin/release/*.zip
        if-no-files-found: error
        retention-days: 1

  godot_editor:
    name: Compiling Godot Editor Plugin
    needs: initialize
    if: needs.initialize.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set nightly version in plugin.cfg
      if: needs.initialize.outputs.build_type == 'Nightly'
      run: |
        NIGHTLY_VERSION="${{ needs.initialize.outputs.version }}"
        BASE_VERSION=$(grep "version=" platforms/godot_editor/addons/admob/plugin.cfg | cut -d'"' -f2)
        sed -i "s/version=\"$BASE_VERSION\"/version=\"$NIGHTLY_VERSION\"/g" platforms/godot_editor/addons/admob/plugin.cfg
        cat platforms/godot_editor/addons/admob/plugin.cfg

    - name: Compress Godot Editor Plugin
      run: ./.github/scripts/compress_editor_plugin.sh

    - name: Upload zip to artifact
      uses: actions/upload-artifact@v7
      with:
        name: godot-editor
        path: platforms/godot_editor/${{ env.ZIP_NAME }}
        if-no-files-found: error
        retention-days: 1

  release-finalize:
    name: "🚀 Finalize and Publish Release"
    needs: [initialize, android-template, ios-template, godot_editor]
    if: needs.initialize.outputs.should_build == 'true' && needs.initialize.outputs.build_type == 'Release'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-artifacts
        merge-multiple: true

    - name: Publish Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        VERSION: ${{ needs.initialize.outputs.version }}
      run: |
        gh release create "$VERSION" release-artifacts/* --title "$VERSION" --generate-notes

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.8'

    - name: Install requests
      run: pip install requests

    - name: Upload to Godot Asset Library
      env:
        ASSET_LIB_USER: ${{ secrets.ASSET_LIBRARY_USERNAME }}
        ASSET_LIB_PASS: ${{ secrets.ASSET_LIBRARY_PASSWORD }}
        VERSION: ${{ needs.initialize.outputs.version }}
        COMMIT_HASH: ${{ github.sha }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        python3 .github/scripts/push.py

  release-nightly:
    name: "🌙 Finalize and Publish Nightly"
    needs: [initialize, android-template, ios-template, godot_editor]
    if: needs.initialize.outputs.should_build == 'true' && needs.initialize.outputs.build_type == 'Nightly'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-artifacts
        merge-multiple: true

    - name: Delete previous nightly release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        EXISTING=$(gh api repos/${{ github.repository }}/releases --paginate -q '.[] | select(.prerelease == true and (.tag_name | contains("-nightly."))) | .tag_name' | head -n 1 || true)
        if [ -n "$EXISTING" ]; then
          echo "Deleting previous nightly release: $EXISTING"
          gh release delete "$EXISTING" --cleanup-tag -y || true
        else
          echo "No previous nightly release found."
        fi

    - name: Publish Nightly Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        VERSION: ${{ needs.initialize.outputs.version }}
      run: |
        gh release create "$VERSION" release-artifacts/* \
          --prerelease \
          --title "$VERSION (Nightly Build)" \
          --notes "Nightly build from branch \`master\`. Generated on $(date -u +'%Y-%m-%d %H:%M:%S UTC'). Commit: ${{ github.sha }}"