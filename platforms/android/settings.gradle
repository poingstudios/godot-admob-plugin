pluginManagement {
    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
        maven { url 'https://cboost.jfrog.io/artifactory/chartboost-mediation' }
        maven { url 'https://cboost.jfrog.io/artifactory/chartboost-core' }
        maven { url 'https://cboost.jfrog.io/artifactory/chartboost-ads/' }
        maven { url 'https://android-sdk.is.com/' }
        maven { url "https://artifactory.bidmachine.io/bidmachine" }
        maven { url "https://imobile-maio.github.io/maven" }
        flatDir {
            dirs 'godot-lib'
        }
    }
}

rootProject.name = "admob"
include ':src:core'
include ':src:ads'
include ':src:mediation:vungle'
include ':src:mediation:meta'
include ':src:mediation:ironsource'
include ':src:mediation:applovin'
include ':src:mediation:bidmachine'
include ':src:mediation:unity_ads'
include ':src:mediation:chartboost'
include ':src:mediation:maio'
