plugins {
    id 'com.android.library'
}

android {
    namespace = "com.poingstudios.godot.admob.line"

    def fullModuleName = rootProject.ext.buildFullModuleName(project)
    base.archivesName = fullModuleName

    defaultConfig {
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

}

dependencies {
    compileOnly project(path: ':src:core')

    def libs = rootProject.ext.readDependencyLibrary(
            file("config/poing_godot_admob_line.gd")
    )

    libs.each { item ->
        println "compileOnly item: $item"
        project.dependencies.add("compileOnly", item.toString())
    }

    implementation 'androidx.appcompat:appcompat:1.7.1'
    implementation 'com.google.android.material:material:1.14.0'
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.3.0'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.7.0'
}
