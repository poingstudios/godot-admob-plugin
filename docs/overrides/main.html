{% extends "base.html" %}

{% block announce %}
  {% if config.extra.announcement %}
    <div id="announcement-wrapper" style="display: none;">
      <script>
        if (localStorage.getItem("admob_banner_dismissed") !== "true") {
          document.getElementById("announcement-wrapper").style.display = "block";
        }
      </script>
      <div class="md-banner__inner md-grid md-typeset announcement-container">
        <div class="announcement-content">
          {{ config.extra.announcement | safe }}
        </div>
        <button class="announcement-close" id="announcement-close" aria-label="Dismiss message">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="currentColor" d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41Z"/></svg>
        </button>
      </div>
    </div>
  {% endif %}
{% endblock %}
