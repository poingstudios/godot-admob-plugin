site_name: Godot AdMob Plugin - Poing Studios
site_url: https://poingstudios.github.io/godot-admob-plugin/
extra_css:
  - stylesheets/extra.css
extra_javascript:
  - javascripts/extra.js
theme:
  features:
    - content.tabs.link
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotation
    - content.code.copy
    - navigation.tabs
  name: material
  custom_dir: docs/overrides
  favicon: assets/icon.ico
  logo: assets/icon.ico
  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline 
        name: Switch to dark mode
      primary: blue
      accent: blue 
    - scheme: slate 
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode    
      primary: blue
      accent: blue
markdown_extensions:
  - md_in_html
  - toc
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true 
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
extra:
  announcement: |
    <div class='announcement-bg-shapes'>
      <div class='shape shape-1'>⚠️</div>
      <div class='shape shape-2'>⚠️</div>
      <div class='shape shape-3'>⚠️</div>
    </div>
    <span class='announcement-title'>⚠️ EXPERIMENTAL DOCUMENTATION</span>
    <div class='announcement-text'>
      You are viewing the <a href='https://github.com/poingstudios/godot-admob-plugin/tree/master' class='announcement-badge'>Master Branch</a> (latest).<br>
      For stable releases, please see the <a href='https://poingstudios.github.io/godot-admob-plugin/stable/' class='announcement-link'>stable version</a>.
    </div>
  version:
    provider: mike
    default: stable
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.com/invite/YEPvYjSSMk
    - icon: fontawesome/brands/github
      link: https://github.com/poingstudios
copyright: |
  &copy; 2023-{current_year} <a href="https://github.com/poingstudios/godot-admob-plugin"  target="_blank" rel="noopener">Poing Studios</a> | Portions of this page are modifications based on work created and <a href="https://developers.google.com/terms/site-policies"  target="_blank" rel="noopener">shared by Google</a> and used according to terms described in the <a href="https://creativecommons.org/licenses/by/4.0/"  target="_blank" rel="noopener">Creative Commons 4.0 Attribution License</a>.

